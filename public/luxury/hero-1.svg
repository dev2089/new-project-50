  <path d="M-30 720 C 280 590, 430 980, 760 820 C 1020 700, 1180 720, 1630 560 L 1630 940 L -30 940 Z" fill="#ffffff" opacity="0.04"/>
  <path d="M-30 760 C 240 660, 470 980, 840 840 C 1140 730, 1260 720, 1630 620" stroke="url(#shine)" stroke-width="32" opacity="0.55"/>
