<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b2227"/>
      <stop offset="0.55" stop-color="#1a1112"/>
      <stop offset="1" stop-color="#0c0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="25%" r="55%">
      <stop offset="0" stop-color="#e0c16c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e0c16c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="1" x2="1" y2="0">
